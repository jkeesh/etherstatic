<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ethereum Web Viewer</title>
  <style>
    /* Minimal default styling; gets overridden if the on-chain payload has its own styles */
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 18px;
      max-width: 720px;
      margin: 32px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #111;
    }
    h1 { font-size: 1.8em; line-height: 1.25; margin: 0.4em 0 0.3em; }
    h2 { font-size: 1.3em; line-height: 1.3; }
    p  { font-size: 1em;   line-height: 1.6; }
    a  { color: #000; }
    @media (max-width: 700px) {
      body { font-size: 20px; margin: 20px auto; padding: 0 18px; }
      h1   { font-size: 1.7em; }
    }
  </style>
</head>
<body>
  <p id="status">Loading from the Ethereum blockchain…</p>

  <script>
    // Public Ethereum JSON-RPC — no API key required.
    // Easy to swap: eth.llamarpc.com, eth-mainnet.public.blastapi.io, eth.meowrpc.com
    const RPC = "https://ethereum-rpc.publicnode.com";

    function hexToStr(hex) {
      if (hex.startsWith("0x")) hex = hex.slice(2);
      let out = "";
      for (let i = 0; i < hex.length; i += 2) {
        out += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
      }
      return out;
    }

    async function load() {
      const status = document.getElementById("status");
      const txhash = location.hash.substring(1);
      if (!txhash) { status.textContent = "Append a transaction hash after #"; return; }

      try {
        const res = await fetch(RPC, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            jsonrpc: "2.0",
            method: "eth_getTransactionByHash",
            params: [txhash],
            id: 1,
          }),
        });
        const json = await res.json();
        if (!json.result) { status.textContent = "Could not load transaction."; return; }
        const webpage = hexToStr(json.result.input);
        // Replace body content with the on-chain HTML. Keeps <head> (viewport + base styles) intact.
        document.body.innerHTML = webpage;
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    }

    load();
  </script>
</body>
</html>
